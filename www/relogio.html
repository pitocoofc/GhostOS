<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>GhostClock OS</title>
    <style>
        :root { --green: #00ff9d; --red: #ff3b30; --bg: #000; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Roboto, sans-serif; }
        body { background: var(--bg); color: white; height: 100vh; display: flex; flex-direction: column; overflow: hidden; }

        /* HEADER / TABS */
        .tabs { display: flex; justify-content: center; gap: 15px; padding: 20px; background: #111; border-bottom: 1px solid #222; }
        .tab-btn { background: none; border: none; color: #555; font-weight: bold; font-size: 14px; padding: 10px 20px; cursor: pointer; border-radius: 8px; transition: 0.3s; }
        .tab-btn.active { color: var(--green); background: #222; }

        /* CONTAINER DE CONTEÚDO */
        .content-area { flex: 1; position: relative; display: flex; align-items: center; justify-content: center; }
        .screen { position: absolute; width: 100%; text-align: center; transition: opacity 0.5s ease, transform 0.5s ease; visibility: hidden; opacity: 0; }
        .screen.active { visibility: visible; opacity: 1; transform: scale(1); }

        /* RELÓGIO */
        .time-text { font-size: 80px; font-weight: 200; display: block; height: 100px; transition: opacity 0.5s; }
        .date-text { font-size: 14px; color: var(--green); letter-spacing: 2px; text-transform: uppercase; margin-top: 10px; }
        
        /* CRONÔMETRO */
        .sw-display { font-size: 65px; font-family: monospace; margin-bottom: 30px; }
        .controls { display: flex; gap: 10px; justify-content: center; }
        .btn { padding: 15px 30px; border: none; border-radius: 12px; font-weight: bold; font-size: 16px; min-width: 120px; }
        #sw-toggle { background: var(--green); color: #000; }
        .btn-reset { background: #333; color: #fff; }

        /* SELETOR */
        .footer { padding: 30px; text-align: center; }
        #region-select { background: #111; color: white; border: 1px solid #333; padding: 12px; border-radius: 10px; width: 80%; max-width: 300px; outline: none; }
        .fade-out { opacity: 0; }
    </style>
</head>
<body>

    <div class="tabs">
        <button id="tab-clock" class="tab-btn active" onclick="showScreen('clock')">RELÓGIO</button>
        <button id="tab-sw" class="tab-btn" onclick="showScreen('sw')">CRONÔMETRO</button>
    </div>

    <div class="content-area">
        <div id="screen-clock" class="screen active">
            <span id="txt-time" class="time-text">00:00</span>
            <div id="txt-date" class="date-text">CARREGANDO...</div>
        </div>

        <div id="screen-sw" class="screen">
            <div id="sw-val" class="sw-display">00:00.00</div>
            <div class="controls">
                <button id="sw-toggle" class="btn" onclick="toggleSW()">INICIAR</button>
                <button class="btn btn-reset" onclick="resetSW()">ZERAR</button>
            </div>
        </div>
    </div>

    <div class="footer" id="region-container">
        <select id="region-select" onchange="saveAndRefresh()">
            <option value="pt-BR">🇧🇷 BRASIL</option>
            <option value="zh-CN">🇨🇳 CHINA</option>
            <option value="fr-FR">🇫🇷 FRANÇA</option>
            <option value="en-US">🇺🇸 EUA</option>
            <option value="en-AU">🇦🇺 AUSTRÁLIA</option>
        </select>
    </div>

    <script>
        let currentMode = 'clock';
        let lastMinute = "";

        // --- LÓGICA DE CACHE ---
        function loadSavedRegion() {
            const saved = localStorage.getItem('ghost_clock_region');
            if (saved) {
                document.getElementById('region-select').value = saved;
            }
        }

        function saveAndRefresh() {
            const selected = document.getElementById('region-select').value;
            localStorage.setItem('ghost_clock_region', selected); // Salva apenas a escolha da região
            lastMinute = ""; 
            updateClock();
        }

        // --- RELÓGIO ---
        function updateClock() {
            if (currentMode !== 'clock') return;

            const region = document.getElementById('region-select').value;
            const timeZones = {
                "pt-BR": "America/Sao_Paulo", "zh-CN": "Asia/Shanghai",
                "fr-FR": "Europe/Paris", "en-US": "America/New_York", "en-AU": "Australia/Sydney"
            };

            const now = new Date();
            const timeStr = now.toLocaleTimeString('pt-BR', { 
                timeZone: timeZones[region], hour: '2-digit', minute: '2-digit' 
            });

            if (timeStr !== lastMinute) {
                const el = document.getElementById('txt-time');
                el.classList.add('fade-out');

                setTimeout(() => {
                    el.innerText = timeStr;
                    document.getElementById('txt-date').innerText = now.toLocaleDateString(region, { 
                        weekday: 'long', day: 'numeric', month: 'short', timeZone: timeZones[region] 
                    }).toUpperCase();
                    el.classList.remove('fade-out');
                    lastMinute = timeStr;
                }, 500);
            }
        }

        // --- NAVEGAÇÃO ---
        function showScreen(mode) {
            currentMode = mode;
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
            document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
            document.getElementById('region-container').style.display = (mode === 'clock') ? 'block' : 'none';

            if(mode === 'clock') {
                document.getElementById('tab-clock').classList.add('active');
                document.getElementById('screen-clock').classList.add('active');
            } else {
                document.getElementById('tab-sw').classList.add('active');
                document.getElementById('screen-sw').classList.add('active');
            }
        }

        // --- CRONÔMETRO ---
        let swInterval, swTime = 0, isRunning = false;
        function toggleSW() {
            const btn = document.getElementById('sw-toggle');
            if (!isRunning) {
                isRunning = true;
                btn.innerText = "PARAR"; btn.style.background = "#ff3b30";
                swInterval = setInterval(() => {
                    swTime++;
                    let m = Math.floor(swTime / 6000), s = Math.floor((swTime % 6000) / 100), ms = swTime % 100;
                    document.getElementById('sw-val').innerText = `${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}.${String(ms).padStart(2,'0')}`;
                }, 10);
            } else {
                isRunning = false;
                btn.innerText = "CONTINUAR"; btn.style.background = "#00ff9d";
                clearInterval(swInterval);
            }
        }
        function resetSW() {
            clearInterval(swInterval); isRunning = false; swTime = 0;
            document.getElementById('sw-val').innerText = "00:00.00";
            document.getElementById('sw-toggle').innerText = "INICIAR";
            document.getElementById('sw-toggle').style.background = "#00ff9d";
        }

        // INICIALIZAÇÃO
        window.onload = () => {
            loadSavedRegion();
            updateClock();
            setInterval(updateClock, 1000);
        };
    </script>
</body>
</html>
