<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Configurações de Wi-Fi</title>
    <style>
        body {
            margin: 0;
            padding: 20px;
            background-color: #ffffff;
            font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            color: #000;
        }

        header {
            margin-bottom: 40px;
        }

        h1 {
            font-size: 32px;
            font-weight: 400;
            margin: 0;
            color: #333;
        }

        /* --- Switch Wi-Fi --- */
        .setting-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
            font-weight: 600;
            font-size: 18px;
        }

        .toggle-switch {
            position: relative;
            display: inline-block;
            width: 50px;
            height: 26px;
        }

        .toggle-switch input { opacity: 0; width: 0; height: 0; }

        .slider {
            position: absolute;
            cursor: pointer;
            inset: 0;
            background-color: #ccc;
            transition: .4s;
            border-radius: 34px;
        }

        .slider:before {
            position: absolute;
            content: "";
            height: 20px;
            width: 20px;
            left: 3px;
            bottom: 3px;
            background-color: white;
            transition: .4s;
            border-radius: 50%;
        }

        input:checked + .slider { background-color: #007aff; }
        input:checked + .slider:before { transform: translateX(24px); }

        /* --- Card de Conexão Ativa --- */
        .active-network {
            background-color: #007aff;
            color: white;
            padding: 20px;
            border-radius: 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            box-shadow: 0 4px 15px rgba(0, 122, 255, 0.3);
            margin-bottom: 40px;
        }

        .network-info { display: flex; align-items: center; gap: 15px; }
        .wifi-icon { font-size: 24px; }
        .network-name { font-size: 18px; font-weight: 600; }
        .network-status { font-size: 13px; opacity: 0.8; display: block; }
        .arrow-right { font-size: 18px; background: rgba(255,255,255,0.2); border-radius: 50%; width: 30px; height: 30px; display: flex; align-items: center; justify-content: center; }

        /* --- Lista de Redes --- */
        .section-title {
            color: #888;
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .empty-list {
            text-align: center;
            padding: 20px;
            color: #aaa;
            font-size: 16px;
        }

        hr { border: 0; border-top: 1px solid #eee; margin: 30px 0; }

        /* --- Detalhes Adicionais (conforme imagem) --- */
        .additional-info {
            margin-top: 40px;
            font-size: 14px;
            line-height: 1.6;
            color: #000;
        }

        .info-title {
            text-align: center;
            font-weight: bold;
            font-size: 16px;
            margin-bottom: 20px;
        }

        .info-grid {
            display: flex;
            justify-content: space-between;
            border-top: 1px solid #eee;
            padding-top: 20px;
        }

        .info-column { width: 45%; }
        .info-column.right { text-align: right; display: flex; align-items: center; justify-content: flex-end; }

    </style>
</head>
<body>

    <header>
        <h1>Wi-Fi</h1>
    </header>

    <div class="setting-row">
        <span>Wi-Fi</span>
        <label class="toggle-switch">
            <input type="checkbox" checked>
            <span class="slider"></span>
        </label>
    </div>

    <div class="active-network">
        <div class="network-info">
            <div class="wifi-icon">📶</div>
            <div>
                <span class="network-name">GhostPhone 5G</span>
                <span class="network-status">Toque para partilhar palavra-passe</span>
            </div>
        </div>
        <div style="display: flex; align-items: center; gap: 10px;">
            <span>🔒</span>
            <div class="arrow-right">›</div>
        </div>
    </div>

    <div class="section-title">
        <span>Redes disponíveis</span>
        <span style="cursor: pointer;">🔄</span>
    </div>
    
    <div class="empty-list">Vazio</div>

    <hr>
    <div style="color: #aaa; font-size: 12px; text-transform: uppercase;">Mais definições</div>

    <div class="additional-info">
        <div class="info-title">adicionais</div>
        
        <div class="info-grid">
            <div class="info-column">
                IP: 777.9710.26<br>
                Segurança: WPA<br>
                Tipo de Rede: Movel<br>
                Upload: 75MB/s<br>
                Download: 80MB/s<br>
                Usuários: 01<br>
                Frequência: 2.4/5G<br>
                Limite/Gasto: 25/75GB
            </div>
            
            <div style="width: 1px; background: #000; height: 150px; margin: 0 10px;"></div>

            <div class="info-column right">
                Operadora: GhostNet
            </div>
        </div>
    </div>

</body>
</html>
