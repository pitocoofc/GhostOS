<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>GhostOS - Booting System...</title>
    <style>
        * { box-sizing: border-box; }
        body {
            background: #050505; color: #fff; margin: 0;
            height: 100vh; display: flex; align-items: center; justify-content: center;
            font-family: 'Consolas', 'Monaco', monospace; overflow: hidden;
            user-select: none;
        }

        .screen { display: none; flex-direction: column; align-items: center; width: 90%; max-width: 400px; }
        .active { display: flex; }

        /* Spinner de Processamento */
        .spinner {
            width: 14px; height: 14px; border: 2px solid #333;
            border-top: 2px solid #fff; border-radius: 50%;
            display: inline-block; animation: spin 1s linear infinite;
            vertical-align: middle; margin-right: 10px;
        }
        @keyframes spin { 100% { transform: rotate(360deg); } }

        /* Logs de Sistema */
        #log-container { text-align: left; width: 100%; font-size: 13px; line-height: 1.8; }
        .log-entry { color: #555; transition: color 0.4s; margin-bottom: 5px; }
        .log-entry.done { color: #eee; }
        .log-entry.done .spinner { display: none; }
        .log-entry.done::before { content: '[ OK ] '; color: #0f0; margin-right: 5px; }

        /* Inputs Estilizados */
        input {
            background: transparent; border: none; border-bottom: 2px solid #3b82f6;
            color: #fff; padding: 10px; font-size: 18px; text-align: center;
            outline: none; width: 100%; margin-top: 20px;
        }

        /* Barras de Progresso */
        .progress-bar { width: 100%; height: 2px; background: #222; margin-top: 20px; overflow: hidden; }
        .fill { height: 100%; background: #3b82f6; width: 0%; transition: width 0.1s; }

        /* BOTÃO DE CACHE (Seletor de Kernel) */
        #cacheBtn {
            position: fixed; top: 10px; right: 10px;
            background: #00c853; border: none; color: #000;
            font-size: 10px; padding: 6px 12px; border-radius: 4px;
            cursor: pointer; font-weight: bold; z-index: 1000;
            letter-spacing: 1px;
        }
        #cacheBtn:active { transform: scale(0.95); background: #00e676; }
    </style>
</head>
<body>

    <button id="cacheBtn">CHECK CACHE</button>

    <div id="phase1" class="screen active">
        <div style="font-size: 24px; letter-spacing: 5px; margin-bottom: 20px;">GHOST_OS</div>
        <div class="progress-bar"><div id="fill1" class="fill"></div></div>
    </div>

    <div id="phase2" class="screen">
        <label>IDENTIFIQUE-SE NO TERMINAL:</label>
        <input type="text" id="username" autocomplete="off" placeholder="Username..." autofocus>
        <p style="font-size: 10px; color: #444; margin-top: 10px;">PRESSIONE ENTER PARA CONFIRMAR</p>
    </div>

    <div id="phase2b" class="screen">
        <label>VALIDANDO CREDENCIAIS...</label>
        <div class="progress-bar"><div id="fillMid" class="fill"></div></div>
    </div>

    <div id="phase2c" class="screen">
        <label>ENTRY_KEY REQUIRED:</label>
        <input type="password" id="password" placeholder="Passcode...">
        <p style="font-size: 10px; color: #444; margin-top: 10px;">PRESSIONE ENTER PARA ACESSAR</p>
    </div>

    <div id="phase3" class="screen">
        <div id="log-container"></div>
    </div>

    <div id="phase4" class="screen">
        <div id="user-welcome" style="margin-bottom: 10px; font-size: 14px; letter-spacing: 2px;"></div>
        <div class="status-text" style="font-size: 10px; color: #888;">INICIANDO KERNEL SELECIONADO...</div>
        <div class="progress-bar"><div id="fill2" class="fill"></div></div>
    </div>

    <script>
        const phase1 = document.getElementById('phase1');
        const phase2 = document.getElementById('phase2');
        const phase2b = document.getElementById('phase2b');
        const phase2c = document.getElementById('phase2c');
        const phase3 = document.getElementById('phase3');
        const phase4 = document.getElementById('phase4');

        // Função para detectar qual sistema deve ser carregado
        const getTargetOS = () => localStorage.getItem("selected_os") || "os.html";

        /* --- LÓGICA DO BOTÃO DE CACHE (DUAL BOOT) --- */
        document.getElementById("cacheBtn").onclick = function() {
            const u = localStorage.getItem("os_user");
            const p = localStorage.getItem("os_pass");
            const target = getTargetOS();

            if(u && p) {
                // Se o usuário já logou antes, pula direto para o OS salvo
                window.location.href = target;
            } else {
                alert("Nenhum registro de usuário encontrado no cache local.");
            }
        };

        /* --- FASE 1: Carregamento Inicial --- */
        let p1 = 0;
        const int1 = setInterval(() => {
            p1 += 2;
            document.getElementById('fill1').style.width = p1 + "%";
            if(p1 >= 100) {
                clearInterval(int1);
                phase1.classList.remove('active');
                phase2.classList.add('active');
                document.getElementById('username').focus();
            }
        }, 30);

        /* --- FASE 2: Input de Nome --- */
        document.getElementById('username').addEventListener('keypress', function(e) {
            if (e.key === 'Enter' && this.value.length > 2) {
                localStorage.setItem("ghost_lang", pt);
                localStorage.setItem('os_user', this.value);
                phase2.classList.remove('active');
                phase2b.classList.add('active');

                let p = 0;
                const mid = setInterval(() => {
                    p += 5;
                    document.getElementById("fillMid").style.width = p + "%";
                    if(p >= 100) {
                        clearInterval(mid);
                        phase2b.classList.remove('active');
                        phase2c.classList.add('active');
                        document.getElementById("password").focus();
                    }
                }, 30);
            }
        });

        /* --- FASE 2C: Input de Senha --- */
        document.getElementById('password').addEventListener('keypress', function(e) {
            if(e.key === "Enter" && this.value.length > 1) {
                localStorage.setItem('os_pass', this.value);
                phase2c.classList.remove('active');
                startLogs();
            }
        });

        /* --- FASE 3: Logs Sequenciais --- */
        const logData = [
            "Detectando Kernel de Interface...",
            "Montando diretórios /sys/kernel...",
            "Iniciando subsistema Ghost_Core...",
            "Carregando drivers de hardware...",
            "Limpando registros de cache temporário...",
            "Finalizando handshake de segurança...",
            "Sistema pronto para execução."
        ];

        function startLogs() {
            phase3.classList.add('active');
            const container = document.getElementById('log-container');
            let current = 0;

            function addLog() {
                if (current < logData.length) {
                    const entry = document.createElement('div');
                    entry.className = 'log-entry';
                    // Adiciona o log de qual OS está sendo carregado no primeiro log
                    let text = logData[current];
                    if(current === 0) text += ` [${getTargetOS()}]`;

                    entry.innerHTML = `<span class="spinner"></span>${text}`;
                    container.appendChild(entry);

                    setTimeout(() => {
                        entry.classList.add('done');
                        current++;
                        addLog();
                    }, 600);
                } else {
                    setTimeout(startFinalPhase, 500);
                }
            }
            addLog();
        }

        /* --- FASE 4: Finalização e Salto para o OS --- */
        function startFinalPhase() {
            phase3.classList.remove('active');
            phase4.classList.add('active');

            const user = localStorage.getItem('os_user') || "OPERATOR";
            document.getElementById('user-welcome').innerText = "BEM-VINDO, " + user.toUpperCase();

            let p2 = 0;
            const targetOS = getTargetOS();

            const int2 = setInterval(() => {
                p2 += 1.5;
                document.getElementById('fill2').style.width = p2 + "%";
                if(p2 >= 100) {
                    clearInterval(int2);
                    // O "Renomeio Virtual" acontece aqui:
                    window.location.href = targetOS;
                }
            }, 40);
        }
    </script>
</body>
</html>
