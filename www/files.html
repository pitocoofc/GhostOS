<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <style>
        /* Mantendo sua interface original */
        body { margin: 0; padding: 20px; background: #0a0a0a; color: #fff; font-family: 'Segoe UI', sans-serif; overflow: hidden; height: 100vh; display: flex; flex-direction: column; }
        .header { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #333; padding-bottom: 10px; flex-shrink: 0; }
        
        #file-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(90px, 1fr)); gap: 15px; margin-top: 20px; overflow-y: auto; flex: 1; align-content: start; }
        .file-item { display: flex; flex-direction: column; align-items: center; gap: 8px; padding: 10px; border-radius: 8px; cursor: pointer; transition: 0.2s; border: 1px solid transparent; }
        .file-item:hover { background: #1a1a1a; border: 1px solid #333; }
        .file-icon { font-size: 40px; }
        .file-name { font-size: 11px; text-align: center; color: #aaa; text-transform: uppercase; max-width: 80px; text-overflow: ellipsis; overflow: hidden; }

        /* Preview e Editor */
        #preview-modal { position: fixed; inset: 0; background: #000; display: none; flex-direction: column; padding: 20px; z-index: 100; }
        #file-content { flex: 1; background: #111; padding: 20px; border: 1px solid #333; border-radius: 8px; font-family: 'Consolas', monospace; color: #4ade80; overflow-y: auto; white-space: pre-wrap; margin-top: 15px; outline: none; }
        
        .btn-group { display: flex; gap: 8px; }
        button { background: #222; border: 1px solid #444; color: #fff; cursor: pointer; border-radius: 4px; padding: 5px 12px; font-size: 11px; }
        .btn-back { background: #3b82f6; border: none; display: none; } /* Botão de voltar azul estilo Ghost */
        .btn-exit { background: #444; border: 1px solid #666; }
        
        #status-bar { font-size: 10px; color: #555; margin-top: 10px; text-transform: uppercase; }
    </style>
</head>
<body>

    <div class="header">
        <div style="display: flex; align-items: center; gap: 10px;">
            <button class="btn-back" id="back-btn" onclick="renderHome()">← VOLTAR</button>
            <span style="font-size: 12px; letter-spacing: 2px;">FILE EXPLORER</span>
        </div>
        <div class="btn-group">
            <button onclick="openEditor()">➕ NOVO</button>
            <button class="btn-exit" onclick="exitApp()">SAIR</button>
        </div>
    </div>

    <div id="status-bar">Root /</div>
    
    <div id="file-grid"></div>

    <div id="preview-modal">
        <div style="display: flex; justify-content: space-between; align-items: center;">
            <h3 id="open-file-name" style="margin:0; font-weight: 300; font-size: 14px;"></h3>
            <div class="btn-group">
                <button style="background:#34a853; border:none; display:none;" id="save-btn" onclick="saveFile()">GRAVAR</button>
                <button onclick="closePreview()">FECHAR</button>
            </div>
        </div>
        <div id="file-content"></div>
    </div>

    <script>
        const USER = 'pitocoofc';
        const REPO = 'WebOS';
        const PATH = 'arquivos_do_sistema';
        const CACHE_KEY = 'ndj_git_cache'; // Chave para o sistema híbrido
        
        let gitFiles = []; 

        function renderHome() {
            const grid = document.getElementById('file-grid');
            const backBtn = document.getElementById('back-btn');
            const statusBar = document.getElementById('status-bar');
            
            grid.innerHTML = '';
            backBtn.style.display = 'none';
            statusBar.innerText = "Root /";

            const folders = [
                { name: 'SISTEMA', icon: '📁', action: () => enterFolder('SISTEMA') },
                { name: 'IMAGENS', icon: '🖼️', action: () => alert('Pasta vazia.') },
                { name: 'DOWNLOADS', icon: '📥', action: () => alert('Sem downloads.') }
            ];

            folders.forEach(f => {
                const item = document.createElement('div');
                item.className = 'file-item';
                item.innerHTML = `<div class="file-icon">${f.icon}</div><div class="file-name">${f.name}</div>`;
                item.onclick = f.action;
                grid.appendChild(item);
            });

            loadUserFiles();
        }

        async function enterFolder(folderName) {
            const grid = document.getElementById('file-grid');
            const backBtn = document.getElementById('back-btn');
            const statusBar = document.getElementById('status-bar');

            grid.innerHTML = "Carregando arquivos de " + folderName + "...";
            backBtn.style.display = 'block';
            statusBar.innerText = "Root / " + folderName;

            if (folderName === 'SISTEMA') {
                try {
                    const response = await fetch(`https://api.github.com/repos/${USER}/${REPO}/contents/${PATH}`);
                    const files = await response.json();
                    
                    grid.innerHTML = '';
                    if (Array.isArray(files)) {
                        let cache = {};
                        files.forEach(file => {
                            if(file.type === 'file') {
                                renderFileItem(file.name, '📄', () => openGitHubFile(file.download_url, file.name));
                                // Salva apenas o nome e url no índice do cache
                                cache[file.name] = file.download_url;
                            }
                        });
                        localStorage.setItem(CACHE_KEY, JSON.stringify(cache));
                    }
                } catch (e) {
                    // SE DER ERRO (OFFLINE), CARREGA DO CACHE
                    grid.innerHTML = '';
                    const offlineFiles = JSON.parse(localStorage.getItem(CACHE_KEY) || '{}');
                    const fileNames = Object.keys(offlineFiles);
                    
                    if (fileNames.length > 0) {
                        fileNames.forEach(name => {
                            renderFileItem(name, '📄', () => openOfflineFile(name));
                        });
                        statusBar.innerText = "Root / SISTEMA (OFFLINE)";
                    } else {
                        grid.innerHTML = "Offline e sem cache disponível.";
                    }
                }
            }
        }

        function renderFileItem(name, icon, action) {
            const grid = document.getElementById('file-grid');
            const item = document.createElement('div');
            item.className = 'file-item';
            item.innerHTML = `<div class="file-icon">${icon}</div><div class="file-name">${name}</div>`;
            item.onclick = action;
            grid.appendChild(item);
        }

        function openEditor() {
            const name = prompt("Nome do arquivo:");
            if (!name) return;
            showModal(name, "", true);
        }

        function saveFile() {
            const name = document.getElementById('open-file-name').innerText;
            const content = document.getElementById('file-content').innerText;
            let userFiles = JSON.parse(localStorage.getItem('ndj_user_files') || '{}');
            userFiles[name] = content;
            localStorage.setItem('ndj_user_files', JSON.stringify(userFiles));
            closePreview();
            renderHome();
        }

        function loadUserFiles() {
            let userFiles = JSON.parse(localStorage.getItem('ndj_user_files') || '{}');
            for (let name in userFiles) {
                renderFileItem(name, '📄', () => showModal(name, userFiles[name], true));
            }
        }

        async function openGitHubFile(url, name) {
            showModal(name, "Lendo dados...", false);
            try {
                const response = await fetch(url);
                const text = await response.text();
                // Salva o conteúdo no cache offline individual
                localStorage.setItem('cache_content_' + name, text);
                document.getElementById('file-content').innerText = text;
            } catch (e) {
                openOfflineFile(name);
            }
        }

        function openOfflineFile(name) {
            const content = localStorage.getItem('cache_content_' + name) || "Conteúdo offline não disponível para este arquivo.";
            showModal(name, content, false);
        }

        function showModal(name, content, editable) {
            document.getElementById('preview-modal').style.display = 'flex';
            document.getElementById('open-file-name').innerText = name.toUpperCase();
            const c = document.getElementById('file-content');
            c.innerText = content;
            c.contentEditable = editable;
            document.getElementById('save-btn').style.display = editable ? "block" : "none";
        }

        function closePreview() { document.getElementById('preview-modal').style.display = 'none'; }
        function exitApp() { window.parent.postMessage({ type: 'CLOSE_WINDOW' }, "*"); }

        renderHome();
    </script>
</body>
</html>
