<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Câmera Simples</title>
  <style>
    body {
      background: #111;
      color: white;
      font-family: Arial;
      text-align: center;
      padding-top: 50px;
    }

    button {
      padding: 15px 25px;
      font-size: 18px;
      border: none;
      border-radius: 10px;
      background: #00ff88;
      color: #000;
      cursor: pointer;
    }

    img {
      margin-top: 20px;
      width: 300px;
      border-radius: 10px;
    }
  </style>
</head>
<body>

  <h1>📷 Câmera</h1>
  <button onclick="tirarFoto()">Tirar Foto</button>

  <div>
    <img id="preview" src="">
  </div>

  <script type="module">
    import { Camera, CameraResultType, CameraSource } from '@capacitor/camera';

    window.tirarFoto = async () => {
      try {
        const image = await Camera.getPhoto({
          quality: 90,
          allowEditing: false,
          resultType: CameraResultType.DataUrl,
          source: CameraSource.Camera
        });

        document.getElementById('preview').src = image.dataUrl;

      } catch (erro) {
        console.log("Erro:", erro);
        alert("Não foi possível acessar a câmera.");
      }
    };
  </script>

</body>
</html>
