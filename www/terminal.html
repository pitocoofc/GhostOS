<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Nexus OS</title>
    <style>
        * { box-sizing: border-box; }
        body { 
            background: #090a0f; 
            color: #00f3ff; 
            font-family: 'Fira Code', 'Consolas', 'Courier New', monospace; 
            padding: 0; 
            margin: 0; 
            height: 100vh;
            height: 100dvh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        
        #terminal-wrapper {
            flex: 1;
            overflow-y: auto;
            padding: 12px 12px 5px 12px;
        }

        #output { 
            white-space: pre-wrap; 
            font-size: 13.5px; 
            line-height: 1.5;
            text-shadow: 0 0 2px rgba(0, 243, 255, 0.3);
        }

        #input-line { 
            display: flex; 
            gap: 6px; 
            align-items: center;
            padding: 6px 12px;
        }

        input, textarea { 
            background: transparent; 
            border: none; 
            color: #ffffff; 
            outline: none; 
            font-family: inherit; 
            font-size: 13.5px; 
        }

        input { flex: 1; color: #e2e8f0; }

        /* BARRA DE ATALHOS - NEON STYLE */
        #termux-bar {
            background: #11131f;
            display: flex;
            justify-content: space-around;
            align-items: center;
            padding: 6px 2px;
            border-top: 1px solid #1e2238;
            user-select: none;
            width: 100%;
        }
        .termux-btn {
            color: #8b9bb4;
            font-size: 11px;
            font-weight: bold;
            padding: 8px 0;
            cursor: pointer;
            text-align: center;
            flex: 1;
            max-width: 60px;
            border-radius: 4px;
            transition: all 0.2s;
        }
        .termux-btn:active {
            background: #252b48;
            color: #00f3ff;
        }
        .termux-btn.active {
            background: #bd00ff;
            color: #fff;
            box-shadow: 0 0 8px #bd00ff;
        }

        /* Interface do Nexus Code Editor */
        #nano-ui {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            height: 100dvh;
            background: #0d0f18;
            color: #ffffff;
            flex-direction: column;
            padding: 6px;
            z-index: 9999;
        }
        #nano-header { 
            background: #bd00ff; 
            color: #ffffff; 
            text-align: center; 
            font-weight: bold; 
            font-size: 12px; 
            padding: 4px 0; 
            letter-spacing: 1px;
            border-radius: 3px 3px 0 0;
        }
        #nano-editor { 
            flex: 1; 
            width: 100%; 
            resize: none; 
            background: #06070a; 
            color: #00f3ff; 
            border: 1px solid #1e2238; 
            padding: 10px; 
            font-size: 13.5px; 
            line-height: 1.4; 
        }
        #nano-footer { 
            background: #11131f; 
            color: #ffffff; 
            font-size: 11px; 
            display: grid; 
            grid-template-columns: repeat(4, 1fr); 
            gap: 6px; 
            border-top: 1px solid #1e2238; 
            padding-top: 6px; 
        }
        .nano-btn { 
            background: #1a1d30; 
            border: 1px solid #2b3254; 
            color: #00f3ff; 
            text-align: center; 
            padding: 5px; 
            cursor: pointer; 
            border-radius: 3px; 
        }

        /* Cores do Shell */
        .user { color: #bd00ff; font-weight: bold; }
        .at { color: #8b9bb4; }
        .host { color: #00f3ff; font-weight: bold; }
        .separator { color: #8b9bb4; }
        .dir { color: #ff0055; font-weight: bold; }
        .char { color: #ffb700; }
        
        .error { color: #ff3366; }
        .success { color: #00ff66; }
        .ls-dir { color: #ff0055; font-weight: bold; }
        .ls-file { color: #00f3ff; }
        .help-cmd { color: #ffb700; font-weight: bold; }
    </style>
</head>
<body>

    <div id="terminal-wrapper" onclick="focarInput()">
        <div id="output">=== NEXUS CORE OS v4.0.1 (arch_x64) ===
Conectado ao FileSystem Virtual (LocalStorage Ativo).
Digite '<span class="help-cmd">help</span>' para listar os comandos executáveis.

</div>
        <div id="input-line">
            <span class="prompt-container" id="prompt-box">
                <span class="user">operator</span><span class="at">@</span><span class="host">nexus-core</span><span class="separator">:</span><span class="dir" id="current-dir">~</span><span class="char">&gt;</span>
            </span>
            
            <input type="text" id="cmd" autofocus spellcheck="false" autocomplete="off">
        </div>
    </div>

    <div id="termux-bar">
        <div class="termux-btn" onclick="triggerKey('ESC')">ESC</div>
        <div class="termux-btn" onclick="triggerKey('/')">/</div>
        <div class="termux-btn" onclick="triggerKey('-')">-</div>
        <div class="termux-btn" id="btn-ctrl" onclick="toggleCtrl()">CTRL</div>
        <div class="termux-btn" onclick="triggerKey('ALT')">ALT</div>
        <div class="termux-btn" onclick="triggerTab()">TAB</div>
        <div class="termux-btn" onclick="triggerSeta('Up')">↑</div>
        <div class="termux-btn" onclick="triggerSeta('Down')">↓</div>
    </div>

    <div id="nano-ui">
        <div id="nano-header">NEXUS CODE EDITOR - arquivo.txt</div>
        <textarea id="nano-editor" spellcheck="false"></textarea>
        <div id="nano-footer">
            <div class="nano-btn" onclick="salvarNano()">^S Salvar</div>
            <div class="nano-btn" onclick="fecharNano()">^X Sair</div>
            <div style="grid-column: span 2; color: #8b9bb4; text-align: right; padding-right: 5px; font-size: 11px;">Modo Interativo Nexus</div>
        </div>
    </div>

    <script>
        const wrapper = document.getElementById('terminal-wrapper');
        const output = document.getElementById('output');
        const input = document.getElementById('cmd');
        const currentDirEl = document.getElementById('current-dir');
        const btnCtrl = document.getElementById('btn-ctrl');
        
        const nanoUi = document.getElementById('nano-ui');
        const nanoHeader = document.getElementById('nano-header');
        const nanoEditor = document.getElementById('nano-editor');

        let historicoComandos = [];
        let historicoIndex = -1;
        let isNanoAberto = false;
        let arquivoSendoEditado = "";
        let ctrlPressionado = false;

        const DEFAULT_FS = {
            "root": {
                "type": "dir",
                "content": {
                    "sys": {
                        "type": "dir",
                        "content": {
                            "operator": {
                                "type": "dir",
                                "content": {
                                    "scripts": { "type": "dir", "content": {} },
                                    "app.js": { "type": "file", "content": "console.log('Iniciando subsistema Nexus...');\nconst core = 'Ativo';\nconsole.log('Status do Core:', core);" },
                                    "info.txt": { "type": "file", "content": "Bem-vindo ao STFG.\nUse 'edit <arquivo>' para modificar arquivos e 'run <arquivo>' para executar scripts." }
                                }
                            }
                        }
                    },
                    "config": { "type": "dir", "content": {} }
                }
            }
        };

        let FS = JSON.parse(localStorage.getItem('nexus_fs')) || DEFAULT_FS;
        let currentPath = ["root", "sys", "operator"]; 

        function salvarFS() { localStorage.setItem('nexus_fs', JSON.stringify(FS)); }
        function focarInput() { if (!isNanoAberto) input.focus(); else nanoEditor.focus(); }

        function getDiretorioAtual() {
            let node = FS;
            for (let folder of currentPath) { node = node[folder].content; }
            return node;
        }

        function obterCaminhoVisual() {
            if (currentPath[1] === "sys" && currentPath[2] === "operator") {
                let sub = currentPath.slice(3).join('/');
                return sub ? `~/${sub}` : `~`;
            }
            return "/" + currentPath.slice(1).join('/');
        }

        function atualizarPrompt() { currentDirEl.innerText = obterCaminhoVisual(); }

        function toggleCtrl() {
            ctrlPressionado = !ctrlPressionado;
            btnCtrl.classList.toggle('active', ctrlPressionado);
            focarInput();
        }

        function triggerKey(char) {
            let alvo = isNanoAberto ? nanoEditor : input;
            let start = alvo.selectionStart;
            let end = alvo.selectionEnd;
            let text = alvo.value;
            alvo.value = text.substring(0, start) + char + text.substring(end);
            alvo.selectionStart = alvo.selectionEnd = start + char.length;
            alvo.focus();
        }

        function triggerSeta(dir) {
            if (isNanoAberto) return;
            if (dir === 'Up') {
                if (historicoComandos.length > 0 && historicoIndex > 0) {
                    historicoIndex--;
                    input.value = historicoComandos[historicoIndex];
                }
            } else {
                if (historicoComandos.length > 0 && historicoIndex < historicoComandos.length - 1) {
                    historicoIndex++;
                    input.value = historicoComandos[historicoIndex];
                } else {
                    historicoIndex = historicoComandos.length;
                    input.value = '';
                }
            }
            input.focus();
        }

        function triggerTab() {
            if (isNanoAberto) return;
            let val = input.value;
            let tokens = val.split(' ');
            let ultimoToken = tokens[tokens.length - 1] || "";
            
            if (ultimoToken) {
                let dir = getDiretorioAtual();
                let matches = Object.keys(dir).filter(k => k.startsWith(ultimoToken));
                if (matches.length === 1) {
                    let complemento = matches[0].slice(ultimoToken.length);
                    input.value += complemento + (dir[matches[0]].type === 'dir' ? '/' : ' ');
                }
            }
            input.focus();
        }


        const shell = {
            'help': () => {
                return `Comandos de Sistema Disponíveis:
  <span class="help-cmd">termux/linux-SubSystem</span> Permite baixar um subsistema Linux
  <span class="help-cmd">scan</span>            Escaneia o diretório atual
  <span class="help-cmd">jump [dir]</span>      Navega para um diretório
  <span class="help-cmd">make-dir [nome]</span> Cria uma nova pasta
  <span class="help-cmd">mkfile [arq]</span>    Cria um novo arquivo
  <span class="help-cmd">read [arq]</span>      Lê o conteúdo de um arquivo
  <span class="help-cmd">purge [alvo]</span>    Deleta arquivo ou pasta
  <span class="help-cmd">move [orig] [dest]</span>Move ou renomeia arquivo
  <span class="help-cmd">clone [orig] [dest]</span>Copia um arquivo
  <span class="help-cmd">where</span>           Exibe o caminho absoluto atual
  <span class="help-cmd">who</span>             Identidade do usuário ativo
  <span class="help-cmd">sysinfo</span>         Exibe dados da máquina e Kernel
  <span class="help-cmd">echo [texto]</span>    Imprime texto na tela
  <span class="help-cmd">edit [arq]</span>      Abre o editor de texto
  <span class="help-cmd">run [arq.js]</span>    Executa um arquivo JS
  <span class="help-cmd">fetch-repo [url]</span>Clona repositórios públicos do GitHub
  <span class="help-cmd">cls</span>             Limpa a tela do terminal`;
            },

            'scan': () => {
                let dir = getDiretorioAtual();
                let itens = Object.keys(dir);
                if (itens.length === 0) return '';
                return itens.map(item => dir[item].type === 'dir' ? `<span class="ls-dir">${item}/</span>` : `<span class="ls-file">${item}</span>`).join('    ');
            },

'termux/linux-subsystem': () => {
    const FLAG_KEY = 'nexus_subsystem_installed';


    if (localStorage.getItem(FLAG_KEY)) {
        delete shell['termux/linux-subsystem'];
        return `<span class="error">nexus: termux/linux-subsystem: Sistema ja baixado</span>`;
    }


    localStorage.setItem(FLAG_KEY, 'true');


    delete shell['termux/linux-subsystem'];

    return `<span class="success">Subsistema Linux instalado com sucesso</span>`;
},

            'jump': (args) => {
                if (!args[0]) { currentPath = ["root", "sys", "operator"]; atualizarPrompt(); return ''; }
                let destino = args[0];
                let dirOriginal = [...currentPath];

                if (destino === "..") {
                    if (currentPath.length > 1) currentPath.pop();
                    atualizarPrompt();
                    return '';
                }

                let partes = destino.split('/');
                let escopo = getDiretorioAtual();

                for (let parte of partes) {
                    if (!parte || parte === '.') continue;
                    if (parte === '..') {
                        if (currentPath.length > 1) currentPath.pop();
                        escopo = getDiretorioAtual();
                        continue;
                    }
                    if (escopo[parte] && escopo[parte].type === 'dir') {
                        currentPath.push(parte);
                        escopo = escopo[parte].content;
                    } else {
                        currentPath = dirOriginal;
                        return `<span class="error">nexus: jump: '${destino}' não encontrado.</span>`;
                    }
                }
                atualizarPrompt();
                return '';
            },

            'make-dir': (args) => {
                if (!args[0]) return `<span class="error">make-dir: nome da pasta obrigatório.</span>`;
                let dir = getDiretorioAtual();
                if (dir[args[0]]) return `<span class="error">make-dir: '${args[0]}' já existe.</span>`;
                dir[args[0]] = { "type": "dir", "content": {} };
                salvarFS();
                return '';
            },

            'mkfile': (args) => {
                if (!args[0]) return `<span class="error">mkfile: nome do arquivo obrigatório.</span>`;
                let dir = getDiretorioAtual();
                if (!dir[args[0]]) { dir[args[0]] = { "type": "file", "content": "" }; salvarFS(); }
                return '';
            },

            'read': (args) => {
                if (!args[0]) return `<span class="error">read: arquivo obrigatório.</span>`;
                let dir = getDiretorioAtual();
                if (!dir[args[0]]) return `<span class="error">read: '${args[0]}' não encontrado.</span>`;
                if (dir[args[0]].type === 'dir') return `<span class="error">read: '${args[0]}' é uma pasta.</span>`;
                return dir[args[0]].content;
            },

            'purge': (args) => {
                if (!args[0]) return `<span class="error">purge: especifique o alvo.</span>`;
                let dir = getDiretorioAtual();
                if (!dir[args[0]]) return `<span class="error">purge: '${args[0]}' não encontrado.</span>`;
                delete dir[args[0]];
                salvarFS();
                return '';
            },

            'move': (args) => {
                if (!args[0] || !args[1]) return `<span class="error">move: informe a origem e o destino.</span>`;
                let dir = getDiretorioAtual();
                if (!dir[args[0]]) return `<span class="error">move: '${args[0]}' não encontrado.</span>`;
                dir[args[1]] = dir[args[0]];
                delete dir[args[0]];
                salvarFS();
                return '';
            },

            'clone': (args) => {
                if (!args[0] || !args[1]) return `<span class="error">clone: informe a origem e o destino.</span>`;
                let dir = getDiretorioAtual();
                if (!dir[args[0]]) return `<span class="error">clone: '${args[0]}' não encontrado.</span>`;
                if (dir[args[0]].type === 'dir') return `<span class="error">clone: cópia de pastas não suportada diretamente.</span>`;
                dir[args[1]] = { "type": "file", "content": dir[args[0]].content };
                salvarFS();
                return '';
            },

            'where': () => "/" + currentPath.slice(1).join('/'),
            'who': () => "operator",
            'sysinfo': () => "Nexus Kernel v4.0.1 (x86_64-nexus-linux-gnu)",
            'echo': (args) => args.join(' '),

            'edit': (args) => {
                if (!args[0]) return `<span class="error">edit: informe o arquivo. Uso: edit &lt;nome&gt;</span>`;
                arquivoSendoEditado = args[0];
                let dir = getDiretorioAtual();
                
                if (!dir[arquivoSendoEditado]) {
                    nanoEditor.value = "";
                } else {
                    if (dir[arquivoSendoEditado].type === 'dir') return `<span class="error">edit: '${arquivoSendoEditado}' é uma pasta.</span>`;
                    nanoEditor.value = dir[arquivoSendoEditado].content;
                }

                isNanoAberto = true;
                nanoHeader.innerText = `NEXUS CODE EDITOR - ${arquivoSendoEditado}`;
                nanoUi.style.display = "flex";
                setTimeout(() => { nanoEditor.focus(); }, 50);
                return "OPEN_NANO_SIGNAL";
            },

            'run': (args) => {
                if (!args[0]) return `<span class="error">Uso: run &lt;arquivo.js&gt;</span>`;
                let dir = getDiretorioAtual();
                if (!dir[args[0]]) return `<span class="error">run: Módulo '${args[0]}' não encontrado.</span>`;
                if (dir[args[0]].type === 'dir') return `<span class="error">run: '${args[0]}' é uma pasta.</span>`;

                let codigoJS = dir[args[0]].content;
                let logsCapturados = [];

                try {
                    let simularConsole = {
                        log: (...params) => { logsCapturados.push(params.map(p => typeof p === 'object' ? JSON.stringify(p) : p).join(' ')); }
                    };
                    
                    let executor = new Function('console', codigoJS);
                    executor(simularConsole);

                    return logsCapturados.length > 0 ? logsCapturados.join('\n') : 'Processo finalizado sem saída.';
                } catch (err) {
                    return `<span class="error">ExecutionError: ${err.message}</span>`;
                }
            },

            'fetch-repo': async (args) => {
                if (!args[0]) return `<span class="error">Uso: fetch-repo &lt;url-do-github.git&gt;</span>`;
                let url = args[0].trim();
                
                let match = url.match(/github\.com\/([^\/]+)\/([^\/\.]+)/);
                if (!match) return `<span class="error">Nexus Fetch Error: URL do GitHub inválida.</span>`;
                
                let usuario = match[1];
                let repoNome = match[2].replace('.git', '');

                printLiveOutput(`Conectando a '${repoNome}'...\nBaixando estrutura via GitHub API...`);

                try {
                    let apiUrl = `https://api.github.com/repos/${usuario}/${repoNome}/contents`;
                    let response = await fetch(apiUrl);
                    if (!response.ok) throw new Error("Repositório não localizado ou privado.");
                    
                    let arquivos = await response.json();
                    let dir = getDiretorioAtual();
                    
                    dir[repoNome] = { "type": "dir", "content": {} };
                    let pastaInterna = dir[repoNome].content;

                    for (let item of arquivos) {
                        if (item.type === 'file') {
                            let fileRes = await fetch(item.download_url);
                            let conteudo = await fileRes.text();
                            pastaInterna[item.name] = { "type": "file", "content": conteudo };
                        } else if (item.type === 'dir') {
                            pastaInterna[item.name] = { "type": "dir", "content": {} };
                        }
                    }

                    salvarFS();
                    return `<span class="success">Sucesso! Repositório '${repoNome}' sincronizado.</span>`;
                } catch (err) {
                    return `<span class="error">Nexus Fetch Failed: ${err.message}</span>`;
                }
            }
        };

        function salvarNano() {
            if (!isNanoAberto) return;
            let dir = getDiretorioAtual();
            dir[arquivoSendoEditado] = { "type": "file", "content": nanoEditor.value };
            salvarFS();
        }

        function fecharNano() {
            isNanoAberto = false;
            nanoUi.style.display = "none";
            output.innerHTML += `> Nexus Code Editor fechado.\n\n`;
            wrapper.scrollTop = wrapper.scrollHeight;
            if(ctrlPressionado) toggleCtrl();
            setTimeout(() => { input.focus(); }, 50);
        }

        window.addEventListener('keydown', (e) => {
            if (isNanoAberto) {
                if ((e.ctrlKey || ctrlPressionado) && e.key.toLowerCase() === 's') { e.preventDefault(); salvarNano(); if(ctrlPressionado) toggleCtrl(); }
                if ((e.ctrlKey || ctrlPressionado) && e.key.toLowerCase() === 'x') { e.preventDefault(); fecharNano(); }
            }
        });

        function printLiveOutput(text) {
            output.innerHTML += text + "\n";
            wrapper.scrollTop = wrapper.scrollHeight;
        }

        input.addEventListener('keydown', async (e) => {
            if (e.key === 'Enter') {
                const rawInput = input.value;
                const cleanInput = rawInput.trim();
                
                if (cleanInput !== '') {
                    if (historicoComandos.length === 0 || historicoComandos[historicoComandos.length - 1] !== cleanInput) {
                        historicoComandos.push(cleanInput);
                    }
                }
                historicoIndex = historicoComandos.length;

                let visualPrompt = obterCaminhoVisual();
                output.innerHTML += `<span><span class="user">operator</span><span class="at">@</span><span class="host">nexus-core</span><span class="separator">:</span><span class="dir">${visualPrompt}</span><span class="char">&gt;</span> ${rawInput}</span>\n`;

                input.value = '';

                let tokens = cleanInput.split(' ').filter(t => t !== '');
                if (tokens.length > 0) {
                    let cmd = tokens[0].toLowerCase();
                    let args = tokens.slice(1);

                    if (cmd === 'cls') {
                        output.innerHTML = '';
                    } else if (shell[cmd]) {
                        let result = await shell[cmd](args);
                        if (result !== "OPEN_NANO_SIGNAL") {
                            if (result !== null && result !== undefined) output.innerHTML += result + "\n\n";
                        }
                    } else {
                        output.innerHTML += `<span class="error">nexus: ${cmd}: comando não reconhecido</span>\n\n`;
                    }
                } else {
                    output.innerHTML += "\n";
                }

                wrapper.scrollTop = wrapper.scrollHeight;
            }
        });

        if (window.visualViewport) {
            window.visualViewport.addEventListener('resize', () => {
                document.body.style.height = window.visualViewport.height + 'px';
                wrapper.scrollTop = wrapper.scrollHeight;
            });
        }

        atualizarPrompt();

if (localStorage.getItem('nexus_subsystem_installed')) {
    delete shell['termux/linux-subsystem'];
}
    </script>
</body>
</html>
