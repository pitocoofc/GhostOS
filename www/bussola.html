<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Ghost Compass</title>

<style>
body{
    background:#000;
    color:#fff;
    font-family: 'Segoe UI', sans-serif;
    margin:0;
    text-align:center;
}

/* TOPO */
.top-bar{
    display:flex;
    justify-content:center;
    gap:40px;
    padding:15px;
    font-size:18px;
}

.mode{
    opacity:0.4;
    cursor:pointer;
}
.mode.active{
    opacity:1;
}

/* GRAUS */
.deg{
    font-size:80px;
    margin-top:10px;
}
.dir{
    font-size:18px;
    opacity:0.6;
}

/* COMPASS */
.compass{
    width:280px;
    height:280px;
    margin:30px auto;
    position:relative;
}

.arrow{
    position:absolute;
    top:-15px;
    left:50%;
    transform:translateX(-50%);
    width:0;height:0;
    border-left:10px solid transparent;
    border-right:10px solid transparent;
    border-bottom:20px solid white;
    z-index:2;
}

.circle{
    width:100%;
    height:100%;
    border-radius:50%;
    border:2px solid #333;
    position:absolute;
    background:url('https://purepng.com/public/uploads/large/purepng.com-compasscompassinstrumentnavigationcardinal-directionspointsdiagram-1701527842316onq7x.png') center/contain no-repeat;
}

/* LOCALIZAÇÃO */
.coords{
    margin-top:30px;
    font-size:14px;
    opacity:0.8;
}

.coords span{
    display:block;
    margin-top:10px;
    font-size:20px;
}

/* BOTÃO */
button{
    margin-top:20px;
    padding:10px 20px;
    background:#111;
    color:#fff;
    border:1px solid #333;
    border-radius:6px;
}
</style>
</head>

<body>

<div class="top-bar">
    <div class="mode active" onclick="setMode('raw')">Bússola</div>
    <div class="mode" onclick="setMode('smooth')">Premium</div>
</div>

<div class="deg" id="deg">0°</div>
<div class="dir" id="dir">N</div>

<div class="compass">
    <div class="arrow"></div>
    <div class="circle" id="circle"></div>
</div>

<div class="coords">
    Lat. S
    <span id="lat">--</span>
    Long. O
    <span id="lon">--</span>
</div>

<button onclick="startCompass()">Iniciar</button>

<script>
const circle = document.getElementById("circle");
const degText = document.getElementById("deg");
const dirText = document.getElementById("dir");

let mode = "raw";
let current = 0;
let target = 0;

/* DIREÇÃO */
function getDirection(deg){
    const dirs = ["N","NE","E","SE","S","SW","W","NW"];
    return dirs[Math.round(deg/45)%8];
}

/* MODO */
function setMode(m){
    mode = m;
    document.querySelectorAll(".mode").forEach(el=>el.classList.remove("active"));
    event.target.classList.add("active");

    current = target;
}

/* SENSOR */
function handler(e){
    let compass = e.webkitCompassHeading || (360 - e.alpha);
    target = compass;
}

/* LOOP */
function update(){
    let angle;

    if(mode === "raw"){
        angle = target;
    }else{
        let diff = target - current;

        if(diff > 180) diff -= 360;
        if(diff < -180) diff += 360;

        current += diff * 0.08;
        angle = current;
    }

    circle.style.transform = `rotate(${-angle}deg)`;

    let rounded = Math.round(angle);
    degText.innerText = rounded + "°";
    dirText.innerText = getDirection(rounded);

    requestAnimationFrame(update);
}
update();

/* GEO */
function locationHandler(pos){
    let lat = pos.coords.latitude;
    let lon = pos.coords.longitude;

    document.getElementById("lat").innerText = formatCoord(lat);
    document.getElementById("lon").innerText = formatCoord(lon);
}

function formatCoord(coord){
    let deg = Math.floor(Math.abs(coord));
    let min = Math.floor((Math.abs(coord) - deg) * 60);
    let sec = Math.floor((((Math.abs(coord) - deg) * 60) - min) * 60);
    return `${deg}°${min}'${sec}"`;
}

/* START */
function startCompass(){
    navigator.geolocation.getCurrentPosition(locationHandler);

    if (typeof DeviceOrientationEvent !== "undefined" &&
        typeof DeviceOrientationEvent.requestPermission === "function") {

        DeviceOrientationEvent.requestPermission()
        .then(response => {
            if(response === "granted"){
                window.addEventListener("deviceorientation", handler);
            }
        });

    } else {
        window.addEventListener("deviceorientationabsolute", handler);
    }
}
</script>

</body>
  </html>
