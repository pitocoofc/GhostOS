<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>GhostOS - Kernel Overclock</title>
    <script src="sys_config.js" onerror="console.log('Modo de teste: sys_config não encontrado')"></script>
    <style>
        * { box-sizing: border-box; }
        body, html {
            margin: 0; padding: 0; height: 100vh;
            background: #000; color: #0f0;
            font-family: 'Consolas', 'Courier New', monospace;
            overflow: hidden; user-select: none;
        }

        /* TELA 1: INTRO */
        #stage-intro {
            position: fixed; inset: 0;
            display: flex; flex-direction: column; align-items: center; justify-content: center;
            z-index: 100; background: #000;
        }
        .text-3d {
            font-size: 50px; font-weight: bold; text-transform: uppercase;
            text-align: center; letter-spacing: 5px; color: #0f0;
            text-shadow: 0 1px 0 #0a0, 0 5px 0 #060, 0 0 5px rgba(0,255,0,0.5);
            animation: formText 2s forwards; opacity: 0;
        }
        @keyframes formText {
            from { opacity: 0; transform: scale(0.8); filter: blur(10px); }
            to { opacity: 1; transform: scale(1); filter: blur(0); }
        }

        .center-btn {
            margin-top: 50px; padding: 15px 40px;
            background: #000; border: 2px solid #0f0; color: #0f0;
            cursor: pointer; transition: 0.3s;
            opacity: 0; animation: fadeIn 1s 1.5s forwards;
        }
        @keyframes fadeIn { to { opacity: 1; } }

        /* TELA 2: MENU */
        #stage-menu { display: none; padding: 30px; height: 100%; flex-direction: column; align-items: center; justify-content: center; gap: 20px; }
        .ovr-btn {
            width: 80%; max-width: 300px; padding: 20px;
            background: #050505; border: 1px solid #1a1a1a;
            color: #0f0; cursor: pointer; display: flex; justify-content: space-between;
        }

        /* TELA 3: SELEÇÃO */
        #stage-select { display: none; padding: 20px; height: 100%; flex-direction: column; }
        .list-container { flex: 1; overflow-y: auto; border: 1px solid #1a1a1a; background: #050505; margin: 10px 0; }
        .list-item { padding: 15px; border-bottom: 1px solid #1a1a1a; color: #aaa; }
        .list-item.selected { background: #0f0; color: #000; }

        /* TELA 4: CÓDIGOS */
        #stage-codes { display: none; position: fixed; inset: 0; padding: 20px; font-size: 11px; background: #000; overflow: hidden; }
        
        /* TELA 5: PROGRESSO */
        #stage-progress { display: none; position: fixed; inset: 0; flex-direction: column; align-items: center; justify-content: center; background: #000; }
        .prog-number { font-size: 80px; text-shadow: 0 0 15px #0f0; }
        .log-container { width: 90%; height: 70%; background: #050505; border: 1px solid #1a1a1a; padding: 10px; overflow-y: auto; font-size: 10px; }
        .success { color: #0f0; } .error { color: #f00; }
    </style>
</head>
<body>

    <div id="stage-intro">
        <div class="text-3d">Ghost<br>Kernel</div>
        <button class="center-btn" onclick="goToMenu()">Iniciar</button>
    </div>

    <div id="stage-menu">
        <div style="font-size:12px;color:#555">SYS/KERNEL/OVR_MODE</div>
        <button class="ovr-btn" onclick="goToSelect('RAM')">RAM UNLOCK <span>🔢</span></button>
        <button class="ovr-btn" onclick="goToSelect('CPU')">CPU BOOST <span>⚡</span></button>
    </div>

    <div id="stage-select">
        <div id="select-title">Selecione o valor:</div>
        <div class="list-container" id="list-container"></div>
        <button id="confirm-selection" class="ovr-btn" style="width:100%; max-width:none" onclick="confirmOverclock()" disabled>Confirmar</button>
    </div>

    <div id="stage-codes"><div id="code-terminal"></div></div>

    <div id="stage-progress">
        <div id="prog-title" style="margin-bottom:20px">Processando...</div>
        <div class="prog-number" id="prog-number">10</div>
        <div class="log-container" id="log-container" style="display:none"></div>
    </div>

    <script>
        // FAIL-SAFE: Se não houver sys_config, usa valores padrão
        let s = (typeof GHOST_SYS !== 'undefined') ? GHOST_SYS : { version: "1.0-TEST", specs: { ram: 8 } };
        let currentType = '';
        let selectedValue = null;

        function setStage(id) {
            document.querySelectorAll('body > div').forEach(div => div.style.display = 'none');
            const target = document.getElementById(id);
            target.style.display = (id.includes('intro') || id.includes('menu') || id.includes('progress')) ? 'flex' : 'block';
        }

        function goToMenu() { setStage('stage-menu'); }

        function goToSelect(type) {
            currentType = type;
            setStage('stage-select');
            const container = document.getElementById('list-container');
            container.innerHTML = '';
            document.getElementById('confirm-selection').disabled = true;

            const options = (type === 'RAM') ? [4, 8, 16, 32] : [25, 50, 75, 100, 125];
            options.forEach(opt => {
                const div = document.createElement('div');
                div.className = 'list-item';
                div.innerText = type === 'RAM' ? opt + " GB Virtual" : opt + "% Boost";
                div.onclick = () => {
                    document.querySelectorAll('.list-item').forEach(i => i.classList.remove('selected'));
                    div.classList.add('selected');
                    selectedValue = opt;
                    document.getElementById('confirm-selection').disabled = false;
                };
                container.appendChild(div);
            });
        }

        function confirmOverclock() {
            if(currentType === 'RAM') startRamFlow();
            else startCpuFlow();
        }

        function startRamFlow() {
            setStage('stage-codes');
            const term = document.getElementById('code-terminal');
            let lines = 0;
            const interval = setInterval(() => {
                term.innerHTML += `> EXECUTING_MEM_PATCH_0x${Math.random().toString(16).slice(2,8)}... OK<br>`;
                lines++;
                if(lines > 15) {
                    clearInterval(interval);
                    runCounter();
                }
            }, 200);
        }

        function runCounter() {
            setStage('stage-progress');
            document.getElementById('prog-title').innerText = "Unlocking RAM...";
            let count = 10;
            const interval = setInterval(() => {
                count++;
                document.getElementById('prog-number').innerText = count;
                if(count >= 100) {
                    clearInterval(interval);
                    finish();
                }
            }, 100);
        }

        function startCpuFlow() {
            setStage('stage-progress');
            document.getElementById('prog-number').style.display = 'none';
            const log = document.getElementById('log-container');
            log.style.display = 'block';
            let step = 0;
            const logs = ["Initializing...", "Core 0 OC...", "Voltage check...", "Syncing...", "Boost Applied!"];
            
            const interval = setInterval(() => {
                log.innerHTML += `<div class="success">> ${logs[step]}</div>`;
                step++;
                if(step >= logs.length) {
                    clearInterval(interval);
                    finish();
                }
            }, 800);
        }

        function finish() {
            document.getElementById('prog-title').innerText = "OVERCLOCK CONCLUÍDO!";
            setTimeout(() => {
                alert("Sistema reiniciado com novas specs!");
                // Se estiver no WebOS, tenta voltar, senão apenas recarrega
                if(window.parent && window.parent !== window) window.parent.postMessage('close_ovr', '*');
                else location.reload();
            }, 2000);
        }
    </script>
</body>
</html>
