<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ndj-AI Premium | Evolution</title>
    <style>
        :root {
            --bg-primary: #0a0a0a;
            --accent-color: #ffffff;
            --glass-bg: rgba(255, 255, 255, 0.05);
            --text-main: #e0e0e0;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; outline: none; }
        body, html { height: 100%; width: 100%; overflow: hidden; background-color: var(--bg-primary); font-family: 'Inter', -apple-system, sans-serif; }

        /* IFRAME SPLASH SCREEN */
        #splash-wrapper {
            position: fixed; inset: 0; z-index: 5000;
            background: #000; display: flex; align-items: center; justify-content: center;
            transition: opacity 0.8s ease;
        }
        #splash-frame {
            width: 100%; height: 100%; border: none;
            animation: softPulse 2s infinite ease-in-out;
        }

        @keyframes softPulse {
            0%, 100% { opacity: 0.4; transform: scale(1); }
            50% { opacity: 1; transform: scale(1.02); }
        }

        /* UI SUAVE */
        #main-chat-screen {
            position: fixed; inset: 0; display: flex; flex-direction: column;
            background: linear-gradient(180deg, #111 0%, #000 100%);
            opacity: 0; transform: translateY(10px);
            transition: all 0.6s cubic-bezier(0.16, 1, 0.3, 1);
        }
        #main-chat-screen.active { opacity: 1; transform: translateY(0); }

        /* HEADER & MODEL SELECTOR */
        #chat-header {
            padding: 20px; border-bottom: 1px solid rgba(255,255,255,0.1);
            display: flex; flex-direction: column; align-items: center; gap: 5px;
            cursor: pointer; position: relative;
        }
        #app-name { color: #fff; font-weight: 600; font-size: 1.1rem; letter-spacing: 1px; }
        #current-model-tag { 
            font-size: 0.7rem; color: #888; text-transform: uppercase; 
            background: var(--glass-bg); padding: 2px 8px; border-radius: 4px;
        }

        /* MINI PAINEL DE MODELOS */
        #model-panel {
            position: absolute; top: 70px; width: 200px;
            background: #1a1a1a; border: 1px solid #333; border-radius: 12px;
            padding: 10px; display: none; flex-direction: column; gap: 8px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5); z-index: 2000;
        }
        .model-option {
            padding: 10px; border-radius: 8px; color: #ccc; font-size: 0.85rem;
            transition: 0.2s; cursor: pointer; border-left: 3px solid transparent;
        }
        .model-option:hover { background: #252525; color: #fff; }
        .model-option.selected { border-left-color: #fff; background: #252525; color: #fff; }

        /* CHAT AREA */
        #chat-box { flex: 1; overflow-y: auto; padding: 25px; display: flex; flex-direction: column; gap: 20px; }
        
        .msg { max-width: 80%; padding: 14px 18px; border-radius: 20px; font-size: 0.95rem; line-height: 1.5; transition: 0.3s; }
        .user-msg { align-self: flex-end; background: #fff; color: #000; border-bottom-right-radius: 4px; box-shadow: 0 4px 15px rgba(255,255,255,0.1); }
        .ai-msg { align-self: flex-start; background: #1a1a1a; color: #e0e0e0; border: 1px solid #333; border-bottom-left-radius: 4px; }

        /* FOOTER */
        #chat-footer { padding: 20px; background: transparent; }
        .input-wrapper { 
            display: flex; align-items: center; background: #161616; 
            border-radius: 16px; padding: 8px 16px; border: 1px solid #222;
            transition: 0.3s;
        }
        .input-wrapper:focus-within { border-color: #444; background: #1a1a1a; }
        #chatInput { flex: 1; border: none; background: transparent; color: #fff; padding: 10px; font-size: 0.95rem; }
        
        #sendBtn { 
            background: transparent; color: #fff; border: none; 
            cursor: pointer; opacity: 0.6; transition: 0.3s;
        }
        #sendBtn:hover { opacity: 1; transform: scale(1.1); }

        /* UTILS */
        .view-code-btn { 
            background: #333; color: #fff; border: none; padding: 6px 12px; 
            border-radius: 6px; margin-top: 10px; cursor: pointer; font-size: 0.75rem; 
        }

        /* MODAL (Simplificado) */
        #code-modal { position: fixed; inset: 0; background: rgba(0,0,0,0.8); z-index: 6000; display: none; align-items: center; justify-content: center; padding: 20px; }
        .modal-content { background: #111; border: 1px solid #333; border-radius: 15px; width: 100%; max-width: 500px; padding: 20px; }
        #modal-code-text { font-family: monospace; color: #0f0; font-size: 0.8rem; white-space: pre-wrap; margin-bottom: 15px; }
        .close-btn { background: #fff; color: #000; border: none; padding: 8px 20px; border-radius: 5px; cursor: pointer; }
    </style>
</head>
<body onload="startSequence()">

    <div id="splash-wrapper">
        <iframe id="splash-frame" src="about:blank"></iframe>
    </div>

    <div id="main-chat-screen">
        <div id="chat-header" onclick="toggleModelPanel()">
            <div id="app-name">Ndj-AI</div>
            <div id="current-model-tag">Modelo: Padrão (v1)</div>
            
            <div id="model-panel">
                <div class="model-option selected" onclick="selectModel('v1', 'Padrão (v1)')">Ndj-Core v1</div>
                <div class="model-option" onclick="selectModel('v2', 'Experimental (v2)')">Ndj-Neo v2</div>
                <div class="model-option" onclick="selectModel('creative', 'Criativo')">Creative-Flow</div>
            </div>
        </div>

        <div id="chat-box"></div>

        <div id="chat-footer">
            <div class="input-wrapper">
                <input type="text" id="chatInput" placeholder="Digite sua mensagem..." onkeypress="if(event.key==='Enter') sendMessage()">
                <button id="sendBtn" onclick="sendMessage()">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 2L11 13M22 2l-7 20-4-9-9-4 20-7z"/></svg>
                </button>
            </div>
        </div>
    </div>

    <div id="code-modal">
        <div class="modal-content">
            <div id="modal-code-text"></div>
            <button class="close-btn" onclick="closeModal()">Fechar</button>
        </div>
    </div>

    <script>
        let currentPath = "v1"; // Pasta inicial

        function startSequence() {
            // Simula o pulso e redireciona
            setTimeout(() => {
                const splash = document.getElementById('splash-wrapper');
                const main = document.getElementById('main-chat-screen');
                
                splash.style.opacity = '0';
                setTimeout(() => {
                    splash.style.display = 'none';
                    main.style.display = 'flex';
                    setTimeout(() => main.classList.add('active'), 50);
                    addMsg("Sistema carregado. Como posso ajudar hoje?", "ai-msg");
                }, 800);
            }, 2500); // 2 segundos e meio de splash
        }

        function toggleModelPanel() {
            const panel = document.getElementById('model-panel');
            panel.style.display = (panel.style.display === 'flex') ? 'none' : 'flex';
        }

        function selectModel(path, label) {
            currentPath = path;
            document.getElementById('current-model-tag').textContent = `Modelo: ${label}`;
            
            // Atualiza visual das opções
            document.querySelectorAll('.model-option').forEach(opt => {
                opt.classList.remove('selected');
                if(opt.textContent.includes(label)) opt.classList.add('selected');
            });
            
            addMsg(`Alternado para o diretório de modelos: /${path}`, 'ai-msg');
        }

        async function sendMessage() {
            const input = document.getElementById('chatInput');
            const text = input.value.trim();
            if (!text) return;

            addMsg(text, 'user-msg');
            input.value = "";

            try {
                // A mágica acontece aqui: ele busca na pasta do modelo selecionado
                const response = await fetch(`https://raw.githubusercontent.com/pitocoofc/Ia.ndj/main/modelos/${currentPath}/respostas.json`);
                const data = await response.json();
                
                let found = false;
                const lowText = text.toLowerCase();

                for (let key in data.keywords) {
                    if (lowText.includes(key)) {
                        const item = data.keywords[key];
                        setTimeout(() => {
                            if (item.codigo) {
                                addMsgWithCode(item.texto, item.codigo);
                            } else {
                                addMsg(item.texto, 'ai-msg');
                            }
                        }, 500);
                        found = true;
                        break;
                    }
                }

                if (!found) {
                    setTimeout(() => addMsg(data.fallback || "Não encontrei nada sobre isso neste modelo.", 'ai-msg'), 500);
                }
            } catch (err) {
                addMsg(`Erro ao acessar base de dados /${currentPath}. Verifique se o arquivo existe no GitHub.`, 'ai-msg');
            }
        }

        function addMsg(text, type) {
            const box = document.getElementById('chat-box');
            const m = document.createElement('div');
            m.className = `msg ${type}`;
            m.textContent = text;
            box.appendChild(m);
            box.scrollTop = box.scrollHeight;
        }

        function addMsgWithCode(text, code) {
            const box = document.getElementById('chat-box');
            const m = document.createElement('div');
            m.className = 'msg ai-msg';
            m.innerHTML = `<div>${text}</div><button class="view-code-btn" onclick="openCodeModal(\`${code}\`)">Visualizar Script</button>`;
            box.appendChild(m);
            box.scrollTop = box.scrollHeight;
        }

        function openCodeModal(code) {
            document.getElementById('code-modal').style.display = 'flex';
            document.getElementById('modal-code-text').textContent = code;
        }

        function closeModal() {
            document.getElementById('code-modal').style.display = 'none';
        }
    </script>
</body>
                      </html>
