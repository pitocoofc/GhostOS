<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>GhostOS - BIOS CRITICAL ERROR</title>
    <style>
        :root { 
            --error-red: #ff3b30; 
            --neon-blue: #00f2ff; 
            --bg: #050505;
        }
        
        body, html {
            margin: 0; padding: 0; height: 100vh;
            background: var(--bg); color: #fff;
            display: flex; align-items: center; justify-content: center;
            font-family: 'Courier New', monospace;
            overflow: hidden; user-select: none;
        }

        /* Efeito de linhas CRT clássico do GhostOS */
        body::before {
            content: " ";
            position: fixed; inset: 0;
            background: linear-gradient(rgba(18, 16, 16, 0) 50%, rgba(0, 0, 0, 0.4) 50%);
            background-size: 100% 3px;
            z-index: 1000; pointer-events: none;
        }

        .error-container {
            width: 90%;
            max-width: 650px;
            border: 2px solid var(--error-red);
            background: rgba(15, 5, 5, 0.85);
            padding: 30px;
            border-radius: 4px;
            box-shadow: 0 0 20px rgba(255, 59, 48, 0.2);
            position: relative;
        }

        h1 {
            color: var(--error-red);
            font-size: 20px;
            margin-top: 0;
            border-bottom: 1px solid var(--error-red);
            padding-bottom: 10px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .error-code {
            background: #110505;
            padding: 12px;
            border-left: 4px solid var(--error-red);
            margin: 20px 0;
            color: #ffb3b3;
            font-size: 13px;
        }

        .blink {
            animation: blinker 1s linear infinite;
        }
        @keyframes blinker { 50% { opacity: 0; } }

        p {
            font-size: 14px;
            line-height: 1.6;
            color: #ddd;
        }

        /* Console Log de Flashing */
        #flash-log {
            font-size: 11px;
            color: #888;
            max-height: 100px;
            overflow-y: hidden;
            margin-bottom: 20px;
            white-space: pre-wrap;
        }

        .success-text {
            color: var(--neon-blue) !important;
            font-weight: bold;
        }

        /* Botões Estilizados */
        .btn-group {
            display: flex;
            gap: 15px;
            margin-top: 25px;
        }

        button {
            flex: 1;
            background: none;
            border: 1px solid #555;
            color: #aaa;
            padding: 12px;
            font-family: 'Courier New', monospace;
            font-size: 13px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.2s;
            text-transform: uppercase;
        }

        button:hover {
            border-color: #fff;
            color: #fff;
            background: rgba(255, 255, 255, 0.05);
        }

        button.action-btn {
            border-color: var(--error-red);
            color: var(--error-red);
        }

        button.action-btn:hover {
            background: var(--error-red);
            color: #000;
            box-shadow: 0 0 10px rgba(255, 59, 48, 0.4);
        }

        button:active {
            transform: scale(0.98);
        }
    </style>
</head>
<body>

    <div class="error-container">
        <h1>[ Hardware Abstraction Layer Error ]</h1>
        
        <p>The system had problems with the BIOS image for SubSystem <span class="blink">SYSTEM HALTED.</span></p>
        
        <div class="error-code">
            STATUS_CODE: GHOST_NO_SYSTEM_x40x02<br>
            REASON: NO_SYSTEM_AVAILABE<br>
            OFFSET: 0x0005F4A2
        </div>

        <div id="flash-log">Awaiting operator action...</div>
        </div>
    </div>
</body>
</html>
